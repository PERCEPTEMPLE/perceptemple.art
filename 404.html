<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="description" content="404 · Signal not found. This path did not cross the collapse threshold.">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://perceptemple.art/404.html">
    
    <title>PERCEPTEMPLE</title>

    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:      #020805;
            --panel:   #020805;
            --rule:    #0a5c1e;
            --hi:      #00ff41;
            --hi2:     #39ff14;
            --amber:   #ffb200;
            --amber2:  #ffcc00;
            --txt:     rgba(0,255,65,0.75);
            --txt2:    rgba(0,255,65,0.9);
            --txt3:    rgba(0,255,65,0.35);
            --white:   #39ff14;
            --red:     #ff2020;
            --fs-xs: clamp(0.65rem, 1.2vw, 0.75rem);
            --fs-sm: clamp(0.75rem, 1.4vw, 0.85rem);
            --fs-md: clamp(0.8rem, 1.6vw, 1rem);
            --fs-lg: clamp(1rem, 2vw, 1.25rem);
            --fs-xl: clamp(1.25rem, 3vw, 1.75rem);
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--txt2);
            font-family: 'Share Tech Mono', monospace;
            font-weight: 400;
            font-size: var(--fs-sm);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeUp 0.4s ease both;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 3px,
                rgba(0,0,0,0.06) 3px,
                rgba(0,0,0,0.06) 6px
            );
            pointer-events: none;
            z-index: 9999;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,255,65,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,65,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 9998;
        }

        .bracket {
            position: fixed;
            color: rgba(0,255,65,0.15);
            font-family: 'Orbitron', sans-serif;
            font-size: var(--fs-md);
            pointer-events: none;
            z-index: 10000;
        }
        .bracket-tl { top: 12px;    left: 16px;  }
        .bracket-tr { top: 12px;    right: 16px; }
        .bracket-bl { bottom: 12px; left: 16px;  }
        .bracket-br { bottom: 12px; right: 16px; }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 42rem;
            position: relative;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-mark {
            font-family: 'Orbitron', sans-serif;
            font-size: var(--fs-xl);
            color: var(--hi);
            letter-spacing: 4px;
            font-weight: 800;
            display: block;
            margin-bottom: 1.25rem;
            word-break: break-word;
        }

        .pch-btn {
            display: inline-block;
            margin-top: 6px;
            background: transparent;
            border: 1px solid var(--red);
            color: var(--red);
            font-family: 'Orbitron', sans-serif;
            font-size: var(--fs-xs);
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 4px 10px;
            text-decoration: none;
            border-radius: 2px;
            font-weight: 700;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .pch-btn:hover {
            background: rgba(255,32,32,0.06);
            color: var(--red);
        }

        .error-line {
            font-family: 'Share Tech Mono', monospace;
            font-size: var(--fs-sm);
            color: var(--txt3);
            margin: 2.5rem 0 1rem;
            letter-spacing: 1px;
        }

        .error-line span {
            color: var(--hi);
        }

        .msg {
            font-family: 'Rajdhani', sans-serif;
            font-size: var(--fs-md);
            color: var(--txt);
            line-height: 1.9;
            margin-bottom: 2.5rem;
            max-width: 52ch;
            font-weight: 400;
        }
        .msg strong {
            color: var(--hi);
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            letter-spacing: 1px;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0);    }
        }

        @media (max-width: 768px) {
            .container {
                padding: 1.5rem;
            }
            .bracket {
                font-size: var(--fs-sm);
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

    <span class="bracket bracket-tl">[</span>
    <span class="bracket bracket-tr">]</span>
    <span class="bracket bracket-bl">[</span>
    <span class="bracket bracket-br">]</span>

    <div class="container">
        <span class="logo-mark">PERCEPTEMPLE</span>
        <a class="pch-btn" href="index.html">HUMAN CONSCIOUSNESS TEST</a>
        <p class="error-line">&gt; status: <span>404</span> — signal_not_found</p>
        <p class="msg">
            This path did not cross the collapse threshold <strong>τ</strong>. 
            The wave function remains in <strong>superposition</strong> — it was never integrated into the system.
        </p>
    </div>

</body>
</html>
