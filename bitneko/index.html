  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* Variables canónicas PERCEPTEMPLE */
      --bg:      #020805;
      --panel:   #020805;
      --rule:    #0a5c1e;
      --hi:      #00ff41;
      --hi2:     #39ff14;
      --amber:   #ffb200;
      --amber2:  #ffcc00;
      --txt:     rgba(0,255,65,0.75);
      --txt2:    rgba(0,255,65,0.9);
      --txt3:    rgba(0,255,65,0.35);
      --white:   #39ff14;
      --red:     #ff2020;

      --fs-xs: clamp(0.65rem, 1.2vw, 0.75rem);
      --fs-sm: clamp(0.75rem, 1.4vw, 0.85rem);
      --fs-md: clamp(0.8rem,  1.6vw, 1rem);
      --fs-lg: clamp(1rem,    2vw,   1.25rem);
      --fs-xl: clamp(1.25rem, 3vw,   1.75rem);

      /* Variables locales del módulo (preservadas) */
      --green-primary: #00ff41;
      --green-secondary: #39ff14;
      --green-dark: #0a5c1e;
      --amber-local: #ffb200;
      --amber-light: #ffcc00;
      --red-stamp: #ff2020;
      --text-dim: rgba(0, 255, 65, 0.75);
      --text-faint: rgba(0, 255, 65, 0.3);
      --border-color: var(--green-dark);
      
      --font-titles: 'Orbitron', monospace;
      --font-body: 'Share Tech Mono', 'Courier New', Courier, monospace;
      --font-manifesto: 'Rajdhani', sans-serif;
      
      --glow-soft: rgba(0, 255, 65, 0.15);
      --glow-medium: rgba(0, 255, 65, 0.35);
      --glow-amber: rgba(255, 178, 0, 0.25);
    }

    html, body {
      background-color: var(--bg);
      color: var(--text-dim);
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0, 0, 0, 0.25) 3px, rgba(0, 0, 0, 0.25) 4px
      );
      pointer-events: none;
      z-index: 1000;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 999;
    }

    /* Reglas universales canónicas */
    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    svg {
      max-width: 100%;
      height: auto;
    }

    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(2, 8, 5, 0.8) 100%);
      pointer-events: none;
      z-index: 998;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 3rem 1.5rem 4rem;
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 60rem;
    }

    .lang-toggle {
      position: fixed;
      top: 1.2rem;
      right: 1.4rem;
      z-index: 2000;
      display: flex;
      gap: 0.4rem;
    }

    .lang-btn {
      font-family: var(--font-body);
      font-size: var(--fs-xs);
      letter-spacing: 0.12em;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid var(--green-dark);
      padding: 0.3em 0.7em;
      cursor: pointer;
      transition: border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      border-radius: 0;
    }

    .lang-btn.active {
      color: var(--green-primary);
      border-color: var(--green-primary);
      box-shadow: 0 0 8px var(--glow-soft);
    }

    .lang-btn:hover {
      color: var(--green-primary);
      border-color: var(--green-secondary);
    }

    .bracket-container {
      position: relative;
      padding: 1.5rem 2rem;
      margin: 1rem 0;
      border: 1px solid var(--green-dark);
    }

    .bracket-container::before,
    .bracket-container::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border: 2px solid var(--green-primary);
    }

    .bracket-container::before {
      top: -1px;
      left: -1px;
      border-right: none;
      border-bottom: none;
    }

    .bracket-container::after {
      bottom: -1px;
      right: -1px;
      border-left: none;
      border-top: none;
    }

    .bracket-inner::before,
    .bracket-inner::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border: 2px solid var(--green-primary);
    }

    .bracket-inner::before {
      top: -1px;
      right: -1px;
      border-left: none;
      border-bottom: none;
    }

    .bracket-inner::after {
      bottom: -1px;
      left: -1px;
      border-right: none;
      border-top: none;
    }

    .stamp {
      display: inline-block;
      font-family: var(--font-titles);
      font-size: var(--fs-xs);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.3em 0.8em;
      border: 1px solid;
      border-radius: 0;
      margin: 0.5rem 0;
    }

    .stamp-amber {
      color: var(--amber-local);
      border-color: var(--amber-local);
      background: rgba(255, 178, 0, 0.08);
      box-shadow: 0 0 6px var(--glow-amber);
    }

    .stamp-red {
      color: var(--red-stamp);
      border-color: var(--red-stamp);
      background: rgba(255, 32, 32, 0.08);
      box-shadow: 0 0 6px rgba(255, 32, 32, 0.2);
    }

    .stamp-green {
      color: var(--green-primary);
      border-color: var(--green-primary);
      background: rgba(0, 255, 65, 0.05);
      box-shadow: 0 0 6px var(--glow-soft);
    }

    .data-block {
      position: relative;
      border: 1px solid var(--green-dark);
      padding: 1.5rem 1.2rem 1.2rem;
      margin: 1.5rem 0;
      background: rgba(2, 8, 5, 0.6);
    }

    .data-block-label {
      position: absolute;
      top: -0.7rem;
      left: 1rem;
      background: var(--bg);
      padding: 0 0.5rem;
      font-family: var(--font-titles);
      font-size: var(--fs-xs);
      letter-spacing: 0.15em;
      color: var(--amber-local);
      text-transform: uppercase;
      border: 1px solid var(--amber-local);
      line-height: 1.4;
    }

    .header {
      text-align: center;
      margin-bottom: 1.8rem;
      animation: fadeIn 1s ease forwards;
      position: relative;
      width: 100%;
      max-width: 75rem;
    }

    h1 {
      font-family: var(--font-titles);
      font-size: clamp(2.4rem, 8vw, 4rem);
      font-weight: 700;
      letter-spacing: 0.25em;
      line-height: 1;
      color: var(--green-primary);
      text-shadow:
        0 0 8px var(--green-primary),
        0 0 20px var(--glow-medium),
        0 0 40px var(--glow-soft);
      animation: flicker 8s infinite;
      text-transform: uppercase;
      word-break: break-word;
    }

    .tagline {
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      letter-spacing: 0.12em;
      color: var(--text-dim);
      margin-top: 0.6rem;
      text-transform: uppercase;
      opacity: 0.85;
      word-break: break-word;
    }

    .divider {
      width: 100%;
      max-width: 440px;
      border: none;
      border-top: 1px solid var(--green-dark);
      opacity: 0.5;
      margin: 1.4rem 0;
    }

    .gif-link {
      display: block;
      cursor: pointer;
      margin-bottom: 0.6rem;
      outline: none;
      transition: transform 0.2s ease;
      position: relative;
    }

    .gif-link:hover,
    .gif-link:focus-visible { transform: scale(1.04); }

    .gif-link img {
      display: block;
      max-width: 100%;
      width: 100%;
      height: auto;
      border: 1px solid var(--green-dark);
      box-shadow: 0 0 12px var(--glow-soft), 0 0 30px rgba(0, 255, 65, 0.05);
      transition: box-shadow 0.3s ease, border-color 0.3s ease;
      border-radius: 0;
    }

    .gif-link:hover img,
    .gif-link:focus-visible img {
      box-shadow: 0 0 20px var(--glow-medium), 0 0 50px rgba(0, 255, 65, 0.15);
      border-color: var(--green-primary);
    }

    .section-label {
      font-family: var(--font-titles);
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 600;
      letter-spacing: 0.3em;
      color: var(--green-primary);
      text-align: center;
      margin: 2rem 0 1rem;
      text-shadow: 0 0 8px var(--glow-soft);
      opacity: 0.9;
      text-transform: uppercase;
      word-break: break-word;
      width: 100%;
      max-width: 60rem;
    }

    .license-note {
      font-size: var(--fs-xs);
      letter-spacing: 0.12em;
      color: var(--text-dim);
      opacity: 0.5;
      text-align: center;
      margin-bottom: 1rem;
      font-style: italic;
      word-break: break-word;
    }

    .license-row {
      display: flex;
      flex-direction: row;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
      max-width: 500px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      letter-spacing: 0.12em;
      color: var(--green-primary);
      background: transparent;
      border: 1px solid var(--green-dark);
      padding: 0.65em 1.4em;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      min-width: 160px;
      text-align: center;
      border-radius: 0;
    }

    .btn::before { content: '> '; opacity: 0.6; color: var(--amber-local); }

    .btn:hover,
    .btn:focus-visible {
      background: rgba(0, 255, 65, 0.06);
      border-color: var(--green-primary);
      box-shadow: 0 0 12px var(--glow-soft), inset 0 0 8px var(--glow-soft);
      outline: none;
    }

    .btn:active { background: rgba(0, 255, 65, 0.12); }

    @keyframes flicker {
      0%, 97%, 100% { opacity: 1; }
      97.5% { opacity: 0.85; }
      98%   { opacity: 1; }
      98.5% { opacity: 0.7; }
      99%   { opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ━━━ MEDIA QUERIES CANÓNICAS ━━━ */

    @media (max-width: 1024px) {
      .header { gap: 0.75rem; }
      .section-label { font-size: var(--fs-xs); }
    }

    @media (max-width: 768px) {
      .container {
        padding: 2rem 1.5rem;
      }
      .header {
        padding: 1rem 1.5rem;
      }
      .license-row {
        flex-direction: column;
        align-items: center;
      }
      .btn {
        width: 100%;
        max-width: 280px;
        text-align: center;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 1.5rem 1rem;
      }
      .header {
        padding: 0.75rem 1rem;
      }
    }

    @media (max-width: 400px) {
      .license-row { flex-direction: column; align-items: center; }
      .btn { width: 100%; max-width: 280px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>

      <a

        data-i18n-aria="btnEn"
        data-i18n="btnEn"
      ></a>

  </main>

  <script>
    const i18n = {
      en: {
        tagline:      "Bridging Ancestral Wisdom with Digital Innovation",
        gifAria:      "BitNeko — go to perceptemple.art",
        licenseLabel: "LICENSE",
        licenseNote:  "ACCESS THE DOCUMENT",
        btnEs:        "ES — Español",
        btnEn:        "EN — English",
        contactLabel: "BitNeko Support Contact — El Salvador",
        closing:      "Before They See Us, We Already Are",
      },
      es: {
        tagline:      "Uniendo la Sabiduría Ancestral con la Innovación Digital",
        gifAria:      "BitNeko — ir a perceptemple.art",
        licenseLabel: "LICENCIA",
        licenseNote:  "ACCEDER AL DOCUMENTO",
        btnEs:        "ES — Español",
        btnEn:        "EN — Inglés",
        contactLabel: "Contacto de Soporte BitNeko — El Salvador",
        closing:      "Antes de que nos Vean, ya Somos",
      }
    };

    let currentLang = 'en';

    function applyLang(lang) {
      const t = i18n[lang];
      if (!t) return;
      currentLang = lang;

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) el.textContent = t[key];
      });

      document.querySelectorAll('[data-i18n-aria]').forEach(el => {
        const key = el.getAttribute('data-i18n-aria');
        if (t[key] !== undefined) el.setAttribute('aria-label', t[key]);
      });

      document.documentElement.setAttribute('lang', lang === 'es' ? 'es' : 'en');

      document.querySelectorAll('.lang-btn').forEach(btn => {
        const isActive = btn.getAttribute('data-lang') === lang;
        btn.classList.toggle('active', isActive);
        btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      });
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => applyLang(btn.getAttribute('data-lang')));
    });

    const browserLang = (navigator.language || navigator.userLanguage || 'en').slice(0, 2);
    applyLang(i18n[browserLang] ? browserLang : 'en');
  </script>
