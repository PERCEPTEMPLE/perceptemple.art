  <!-- ================================================================ -->
  <!-- SECCION FUENTES: TIPOGRAFIA OFICIAL DEL ECOSISTEMA               -->
  <!-- Orbitron    -> Titulos, stamps, designators                      -->
  <!-- Share Tech Mono -> Cuerpo, datos, tablas, codigo                 -->
  <!-- Rajdhani    -> Manifiestos, citas, textos filosoficos            -->
  <!-- ================================================================ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ================================================================ */
    /* RESET Y VARIABLES CSS OFICIALES DEL ECOSISTEMA                   */
    /* Blueprint: Fondo #020805, verdes oficiales, ambar, rojo stamp     */
    /* ================================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* Colores oficiales PERCEPTEMPLE */
      --bg: #020805;
      --green-primary: #00ff41;
      --green-secondary: #39ff14;
      --green-dark: #0a5c1e;
      --amber: #ffb200;
      --amber-light: #ffcc00;
      --red-stamp: #ff2020;
      --text-dim: rgba(0, 255, 65, 0.75);
      --text-faint: rgba(0, 255, 65, 0.3);
      --border-color: var(--green-dark);
      
      /* Tipografia oficial */
      --font-titles: 'Orbitron', monospace;
      --font-body: 'Share Tech Mono', 'Courier New', Courier, monospace;
      --font-manifesto: 'Rajdhani', sans-serif;
      
      /* Efectos glow */
      --glow-soft: rgba(0, 255, 65, 0.15);
      --glow-medium: rgba(0, 255, 65, 0.35);
      --glow-amber: rgba(255, 178, 0, 0.25);
    }

    html, body {
      background-color: var(--bg);
      color: var(--text-dim);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ================================================================ */
    /* EFECTO CRT SCANLINES (body::before)                              */
    /* Oficial del blueprint: lineas horizontales simulando monitor CRT */
    /* ================================================================ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0, 0, 0, 0.25) 3px, rgba(0, 0, 0, 0.25) 4px
      );
      pointer-events: none;
      z-index: 1000;
    }

    /* ================================================================ */
    /* EFECTO GRID 60px (body::after)                                   */
    /* Oficial del blueprint: cuadricula tactica de fondo               */
    /* ================================================================ */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 999;
    }

    /* ================================================================ */
    /* VIGNETTE ADICIONAL (radial gradient oscurecimiento bordes)        */
    /* ================================================================ */
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(2, 8, 5, 0.8) 100%);
      pointer-events: none;
      z-index: 998;
    }

    /* ================================================================ */
    /* CONTENEDOR PRINCIPAL                                             */
    /* ================================================================ */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 3rem 1.5rem 4rem;
      position: relative;
      z-index: 10;
    }

    /* ================================================================ */
    /* SECCION DOC-01: TOGGLE DE IDIOMA                                 */
    /* Componente: Language selector (EN/ES)                            */
    /* Posicion: Fixed top-right                                          */
    /* ================================================================ */
    .lang-toggle {
      position: fixed;
      top: 1.2rem;
      right: 1.4rem;
      z-index: 2000;
      display: flex;
      gap: 0.4rem;
    }

    .lang-btn {
      font-family: var(--font-body);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid var(--green-dark);
      padding: 0.3em 0.7em;
      cursor: pointer;
      transition: border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      border-radius: 0;
    }

    .lang-btn.active {
      color: var(--green-primary);
      border-color: var(--green-primary);
      box-shadow: 0 0 8px var(--glow-soft);
    }

    .lang-btn:hover {
      color: var(--green-primary);
      border-color: var(--green-secondary);
    }

    /* ================================================================ */
    /* SECCION DOC-02: BRACKETS EN ESQUINAS (decorativo oficial)         */
    /* Componente: .bracket                                             */
    /* Uso: Envolver secciones criticas con brackets tacticos           */
    /* ================================================================ */
    .bracket-container {
      position: relative;
      padding: 1.5rem 2rem;
      margin: 1rem 0;
      border: 1px solid var(--green-dark);
    }

    .bracket-container::before,
    .bracket-container::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border: 2px solid var(--green-primary);
    }

    .bracket-container::before {
      top: -1px;
      left: -1px;
      border-right: none;
      border-bottom: none;
    }

    .bracket-container::after {
      bottom: -1px;
      right: -1px;
      border-left: none;
      border-top: none;
    }

    .bracket-inner::before,
    .bracket-inner::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border: 2px solid var(--green-primary);
    }

    .bracket-inner::before {
      top: -1px;
      right: -1px;
      border-left: none;
      border-bottom: none;
    }

    .bracket-inner::after {
      bottom: -1px;
      left: -1px;
      border-right: none;
      border-top: none;
    }

    /* ================================================================ */
    /* SECCION DOC-03: STAMPS DE CLASIFICACION                          */
    /* Componente: .stamp                                               */
    /* Uso: Marcas de estado, clasificacion, alertas                    */
    /* Colores: ambar (#ffb200) info, rojo (#ff2020) alerta             */
    /* ================================================================ */
    .stamp {
      display: inline-block;
      font-family: var(--font-titles);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.3em 0.8em;
      border: 1px solid;
      border-radius: 0;
      margin: 0.5rem 0;
    }

    .stamp-amber {
      color: var(--amber);
      border-color: var(--amber);
      background: rgba(255, 178, 0, 0.08);
      box-shadow: 0 0 6px var(--glow-amber);
    }

    .stamp-red {
      color: var(--red-stamp);
      border-color: var(--red-stamp);
      background: rgba(255, 32, 32, 0.08);
      box-shadow: 0 0 6px rgba(255, 32, 32, 0.2);
    }

    .stamp-green {
      color: var(--green-primary);
      border-color: var(--green-primary);
      background: rgba(0, 255, 65, 0.05);
      box-shadow: 0 0 6px var(--glow-soft);
    }

    /* ================================================================ */
    /* SECCION DOC-04: DATA-BLOCKS CON LABEL FLOTANTE                   */
    /* Componente: .data-block                                          */
    /* Uso: Contenedores de informacion con etiqueta superior            */
    /* ================================================================ */
    .data-block {
      position: relative;
      border: 1px solid var(--green-dark);
      padding: 1.5rem 1.2rem 1.2rem;
      margin: 1.5rem 0;
      background: rgba(2, 8, 5, 0.6);
    }

    .data-block-label {
      position: absolute;
      top: -0.7rem;
      left: 1rem;
      background: var(--bg);
      padding: 0 0.5rem;
      font-family: var(--font-titles);
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      color: var(--amber);
      text-transform: uppercase;
      border: 1px solid var(--amber);
      line-height: 1.4;
    }

    /* ================================================================ */
    /* SECCION DOC-05: HEADER PRINCIPAL                                   */
    /* Componente: .header                                              */
    /* Tipografia: Orbitron (titulos), Share Tech Mono (tagline)        */
    /* ================================================================ */
    .header {
      text-align: center;
      margin-bottom: 1.8rem;
      animation: fadeIn 1s ease forwards;
      position: relative;
    }

    h1 {
      font-family: var(--font-titles);
      font-size: clamp(2.4rem, 8vw, 4rem);
      font-weight: 700;
      letter-spacing: 0.25em;
      line-height: 1;
      color: var(--green-primary);
      text-shadow:
        0 0 8px var(--green-primary),
        0 0 20px var(--glow-medium),
        0 0 40px var(--glow-soft);
      animation: flicker 8s infinite;
      text-transform: uppercase;
    }

    .tagline {
      font-family: var(--font-body);
      font-size: clamp(0.6rem, 2.2vw, 0.78rem);
      letter-spacing: 0.12em;
      color: var(--text-dim);
      margin-top: 0.6rem;
      text-transform: uppercase;
      opacity: 0.85;
    }

    /* ================================================================ */
    /* SECCION DOC-06: DIVISORES                                        */
    /* Componente: .divider                                             */
    /* Estilo: Linea horizontal con opacidad reducida                   */
    /* ================================================================ */
    .divider {
      width: 100%;
      max-width: 440px;
      border: none;
      border-top: 1px solid var(--green-dark);
      opacity: 0.5;
      margin: 1.4rem 0;
    }

    /* ================================================================ */
    /* SECCION DOC-07: GIF LINK (BitNeko animado)                         */
    /* Componente: .gif-link                                            */
    /* Funcion: Enlace a perceptemple.art con imagen animada              */
    /* ================================================================ */
    .gif-link {
      display: block;
      cursor: pointer;
      margin-bottom: 0.6rem;
      outline: none;
      transition: transform 0.2s ease;
      position: relative;
    }

    .gif-link:hover,
    .gif-link:focus-visible { transform: scale(1.04); }

    .gif-link img {
      display: block;
      width: 320px;
      max-width: 90vw;
      height: auto;
      border: 1px solid var(--green-dark);
      box-shadow: 0 0 12px var(--glow-soft), 0 0 30px rgba(0, 255, 65, 0.05);
      transition: box-shadow 0.3s ease, border-color 0.3s ease;
      border-radius: 0;
    }

    .gif-link:hover img,
    .gif-link:focus-visible img {
      box-shadow: 0 0 20px var(--glow-medium), 0 0 50px rgba(0, 255, 65, 0.15);
      border-color: var(--green-primary);
    }

    .gif-caption {
      font-size: clamp(0.55rem, 1.8vw, 0.65rem);
      color: var(--text-dim);
      opacity: 0.5;
      text-align: center;
      margin-top: 0.4rem;
      letter-spacing: 0.1em;
    }

    /* ================================================================ */
    /* SECCION DOC-08: ETIQUETAS DE SECCION                               */
    /* Componente: .section-label                                         */
    /* Tipografia: Orbitron, color verde principal                      */
    /* ================================================================ */
    .section-label {
      font-family: var(--font-titles);
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 600;
      letter-spacing: 0.3em;
      color: var(--green-primary);
      text-align: center;
      margin: 2rem 0 1rem;
      text-shadow: 0 0 8px var(--glow-soft);
      opacity: 0.9;
      text-transform: uppercase;
    }

    /* ================================================================ */
    /* SECCION DOC-09: NOTAS DE LICENCIA                                  */
    /* Componente: .license-note                                          */
    /* Estilo: Italica, opacidad reducida                                 */
    /* ================================================================ */
    .license-note {
      font-size: clamp(0.55rem, 1.8vw, 0.65rem);
      letter-spacing: 0.12em;
      color: var(--text-dim);
      opacity: 0.5;
      text-align: center;
      margin-bottom: 1rem;
      font-style: italic;
    }

    /* ================================================================ */
    /* SECCION DOC-10: BOTONES / BOTONERA                                 */
    /* Componente: .btn                                                   */
    /* Estilo: Militar, sin border-radius, prefijo "> "                  */
    /* ================================================================ */
    .license-row {
      display: flex;
      flex-direction: row;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
      max-width: 500px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-body);
      font-size: clamp(0.7rem, 2.5vw, 0.82rem);
      letter-spacing: 0.12em;
      color: var(--green-primary);
      background: transparent;
      border: 1px solid var(--green-dark);
      padding: 0.65em 1.4em;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      min-width: 160px;
      text-align: center;
      border-radius: 0;
    }

    .btn::before { content: '> '; opacity: 0.6; color: var(--amber); }

    .btn:hover,
    .btn:focus-visible {
      background: rgba(0, 255, 65, 0.06);
      border-color: var(--green-primary);
      box-shadow: 0 0 12px var(--glow-soft), inset 0 0 8px var(--glow-soft);
      outline: none;
    }

    .btn:active { background: rgba(0, 255, 65, 0.12); }

    /* ================================================================ */
    /* SECCION DOC-11: ANIMACIONES OFICIALES                              */
    /* flicker: Efecto de parpadeo CRT en titulos                        */
    /* fadeIn: Entrada suave de elementos                                 */
    /* ================================================================ */
    @keyframes flicker {
      0%, 97%, 100% { opacity: 1; }
      97.5% { opacity: 0.85; }
      98%   { opacity: 1; }
      98.5% { opacity: 0.7; }
      99%   { opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ================================================================ */
    /* SECCION DOC-12: RESPONSIVE Y ACCESIBILIDAD                         */
    /* Breakpoint: 400px (mobile)                                         */
    /* prefers-reduced-motion: Desactiva animaciones                      */
    /* ================================================================ */
    @media (max-width: 400px) {
      .license-row { flex-direction: column; align-items: center; }
      .btn { width: 100%; max-width: 280px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>

  <!-- ================================================================ -->
  <!-- CAPA VIGNETTE: Oscurecimiento radial de bordes                   -->
  <!-- Z-index: 998 (debajo de scanlines y grid)                        -->
  <!-- ================================================================ -->
  <div class="vignette" aria-hidden="true"></div>

  <!-- ================================================================ -->
  <!-- DOC-01: TOGGLE DE IDIOMA (Language Selector)                     -->
  <!-- Funcion: Cambio dinamico entre EN y ES via JavaScript            -->
  <!-- Componente: nav.lang-toggle                                      -->
  <!-- ================================================================ -->
  <nav class="lang-toggle" aria-label="Language selector">
    <button class="lang-btn active" data-lang="en" aria-pressed="true">EN</button>
    <button class="lang-btn" data-lang="es" aria-pressed="false">ES</button>
  </nav>

  <!-- ================================================================ -->
  <!-- CONTENEDOR PRINCIPAL                                             -->
  <!-- role="main" para accesibilidad                                   -->
  <!-- ================================================================ -->
  <main class="container" role="main">

    <!-- ================================================================ -->
    <!-- DOC-02: HEADER PRINCIPAL                                         -->
    <!-- Contenido: H1 BITNEKO + tagline bilingue                         -->
    <!-- Tipografia: Orbitron (h1) / Share Tech Mono (tagline)            -->
    <!-- ================================================================ -->
    <header class="header">
      <h1>BITNEKO</h1>
      <p class="tagline" data-i18n="tagline"></p>
    </header>

    <hr class="divider" aria-hidden="true" />

    <!-- ================================================================ -->
    <!-- DOC-03: STAMP DE CLASIFICACION (INFO)                              -->
    <!-- Tipo: stamp-amber                                                  -->
    <!-- Mensaje: Estado del modulo                                         -->
    <!-- ================================================================ -->
    <div style="text-align: center; margin: 0.5rem 0;">
      <span class="stamp stamp-amber">SYMBOL // ACTIVE</span>
    </div>

    <!-- ================================================================ -->
    <!-- DOC-04: GIF LINK (BitNeko animado)                                 -->
    <!-- Funcion: Enlace a perceptemple.art                                 -->
    <!-- Imagen: bitneko.gif (320x268)                                      -->
    <!-- Atributos: loading="eager", decoding="async"                       -->
    <!-- ================================================================ -->
    <a
      class="gif-link"
      href="https://perceptemple.art"
      target="_blank"
      rel="noopener noreferrer"
      data-i18n-aria="gifAria"
      title="perceptemple.art"
    >
      <img
        src="bitneko.gif"
        data-i18n-alt="gifAlt"
        width="320"
        height="268"
        loading="eager"
        decoding="async"
      />
    </a>
    <p class="gif-caption" data-i18n="gifCaption"></p>

    <hr class="divider" aria-hidden="true" />

    <!-- ================================================================ -->
    <!-- DOC-05: SECCION LICENCIA                                           -->
    <!-- Estructura: Label + Nota + Botonera (ES/EN)                        -->
    <!-- Tipografia: Orbitron (label) / Share Tech Mono (botones)           -->
    <!-- ================================================================ -->
    <p class="section-label" data-i18n="licenseLabel"></p>
    <p class="license-note" data-i18n="licenseNote"></p>

    <div class="license-row">
      <a
        class="btn"
        href="BITNEKO_LICENCIA_ESPAÑOL.pdf"
        download="BITNEKO_LICENCIA_ESPAÑOL.pdf"
        data-i18n-aria="btnEs"
        data-i18n="btnEs"
      ></a>
      <a
        class="btn"
        href="BITNEKO_LICENCE_ENGLISH.pdf"
        download="BITNEKO_LICENCE_ENGLISH.pdf"
        data-i18n-aria="btnEn"
        data-i18n="btnEn"
      ></a>
    </div>

  </main>

  <!-- ================================================================ -->
  <!-- SECCION ENGINE: SISTEMA DE TRADUCCIONES (i18n)                     -->
  <!--                                                                    -->
  <!--  MOTOR DE INTERNACIONALIZACION                                    -->
  <!--  =============================                                    -->
  <!--  Para agregar un nuevo idioma:                                    -->
  <!--  1. Duplicar bloque 'en' o 'es'                                   -->
  <!--  2. Cambiar la clave (ej: 'fr', 'pt')                             -->
  <!--  3. Traducir cada valor                                           -->
  <!--  4. El motor detectara automaticamente la nueva clave             -->
  <!--                                                                    -->
  <!--  NO MODIFICAR la logica de applyLang() a menos que se             -->
  <!--  comprenda completamente el sistema de atributos data-i18n        -->
  <!--                                                                    -->
  <!-- ================================================================ -->
  <script>
    // --------------------------------------------------------------
    // TRANSLATIONS
    // To add a new language: duplicate one block,
    // change the key, and translate each value.
    // --------------------------------------------------------------
    const i18n = {
      en: {
        tagline:      "Bridging Ancestral Wisdom with Digital Innovation",
        gifCaption:   "[ click on BitNeko to enter perceptemple.art ]",
        gifAria:      "BitNeko — go to perceptemple.art",
        gifAlt:       "BitNeko — animated digital symbol of the PERCEPTEMPLE ecosystem",
        licenseLabel: "LICENSE",
        licenseNote:  "click to access the document",
        btnEs:        "ES — Español",
        btnEn:        "EN — English",
        contactLabel: "BitNeko Support Contact — El Salvador",
        closing:      "Before They See Us, We Already Are",
      },
      es: {
        tagline:      "Uniendo la Sabiduría Ancestral con la Innovación Digital",
        gifCaption:   "[ haz clic en BitNeko para entrar a perceptemple.art ]",
        gifAria:      "BitNeko — ir a perceptemple.art",
        gifAlt:       "BitNeko — símbolo digital animado del ecosistema PERCEPTEMPLE",
        licenseLabel: "LICENCIA",
        licenseNote:  "haz clic para acceder al documento",
        btnEs:        "ES — Español",
        btnEn:        "EN — Inglés",
        contactLabel: "Contacto de Soporte BitNeko — El Salvador",
        closing:      "Antes de que nos Vean, ya Somos",
      }
    };

    // --------------------------------------------------------------
    // ENGINE — no need to edit below this line
    // --------------------------------------------------------------
    let currentLang = 'en';

    function applyLang(lang) {
      const t = i18n[lang];
      if (!t) return;
      currentLang = lang;

      // Text content
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) el.textContent = t[key];
      });

      // aria-label
      document.querySelectorAll('[data-i18n-aria]').forEach(el => {
        const key = el.getAttribute('data-i18n-aria');
        if (t[key] !== undefined) el.setAttribute('aria-label', t[key]);
      });

      // img alt
      document.querySelectorAll('[data-i18n-alt]').forEach(el => {
        const key = el.getAttribute('data-i18n-alt');
        if (t[key] !== undefined) el.setAttribute('alt', t[key]);
      });

      // html lang attribute
      document.documentElement.setAttribute('lang', lang === 'es' ? 'es' : 'en');

      // toggle button states
      document.querySelectorAll('.lang-btn').forEach(btn => {
        const isActive = btn.getAttribute('data-lang') === lang;
        btn.classList.toggle('active', isActive);
        btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      });
    }

    // Wire up buttons
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => applyLang(btn.getAttribute('data-lang')));
    });

    // Auto-detect browser language on load
    const browserLang = (navigator.language || navigator.userLanguage || 'en').slice(0, 2);
    applyLang(i18n[browserLang] ? browserLang : 'en');
  </script>

</body>
</html>
