  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:      #020805;
      --panel:   #020805;
      --rule:    #0a5c1e;
      --hi:      #00ff41;
      --hi2:     #39ff14;
      --amber:   #ffb200;
      --amber2:  #ffcc00;
      --txt:     rgba(0,255,65,0.75);
      --txt2:    rgba(0,255,65,0.9);
      --txt3:    rgba(0,255,65,0.35);
      --white:   #39ff14;
      --red:     #ff2020;
      --red2:    #ff4d4d;

      --fs-xs: clamp(0.65rem, 1.2vw, 0.75rem);
      --fs-sm: clamp(0.75rem, 1.4vw, 0.85rem);
      --fs-md: clamp(0.8rem,  1.6vw, 1rem);
      --fs-lg: clamp(1rem,    2vw,   1.25rem);
      --fs-xl: clamp(1.25rem, 3vw,   1.75rem);
    }

    html, body {
      background-color: var(--bg);
      color: var(--txt2);
      font-family: 'Share Tech Mono', monospace;
      font-weight: 400;
      font-size: var(--fs-sm);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.06) 3px,
        rgba(0,0,0,0.06) 6px
      );
      pointer-events: none;
      z-index: 9999;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,65,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,65,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 9998;
    }

    .bracket {
      position: fixed;
      color: rgba(0,255,65,0.15);
      font-family: 'Orbitron', sans-serif;
      font-size: var(--fs-md);
      pointer-events: none;
      z-index: 10000;
    }
    .bracket-tl { top: 12px;    left: 16px;  }
    .bracket-tr { top: 12px;    right: 16px; }
    .bracket-bl { bottom: 12px; left: 16px;  }
    .bracket-br { bottom: 12px; right: 16px; }

    .lang-toggle {
      position: fixed;
      top: 1.2rem;
      right: 1.4rem;
      z-index: 2000;
      display: flex;
      gap: 0.4rem;
    }

    .lang-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: var(--fs-xs);
      letter-spacing: 0.12em;
      color: var(--txt);
      background: transparent;
      border: 1px solid var(--rule);
      padding: 0.3em 0.7em;
      cursor: pointer;
      transition: border-color 0.2s ease, color 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      border-radius: 0;
    }

    .lang-btn.active {
      color: var(--hi);
      border-color: var(--hi);
    }

    .lang-btn:hover {
      color: var(--hi);
      border-color: var(--hi2);
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      position: relative;
      z-index: 100;
      width: 100%;
      max-width: 42rem;
      text-align: center;
    }

    .pch-btn {
      display: inline-block;
      margin-top: 6px;
      margin-bottom: 2.5rem;
      background: transparent;
      border: 1px solid var(--red);
      color: var(--red);
      font-family: 'Orbitron', sans-serif;
      font-size: var(--fs-xs);
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 10px;
      text-decoration: none;
      border-radius: 2px;
      font-weight: 700;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .pch-btn:hover {
      background: rgba(255,32,32,0.08);
      color: var(--red2);
      border-color: var(--red2);
    }

    .insight {
      font-family: 'Rajdhani', sans-serif;
      font-size: var(--fs-md);
      color: var(--txt);
      line-height: 1.9;
      margin-bottom: 2.5rem;
      max-width: 52ch;
      font-weight: 400;
    }

    .divider-line {
      width: 100%;
      max-width: 440px;
      border: none;
      border-top: 1px solid var(--rule);
      opacity: 0.4;
      margin: 0 0 2rem;
    }

    .file-links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
      max-width: 500px;
    }

    .file-eyebrow {
      font-family: 'Share Tech Mono', monospace;
      font-size: var(--fs-xs);
      color: var(--txt3);
      letter-spacing: 1px;
      word-break: break-all;
    }

    .file-link {
      font-family: 'Share Tech Mono', monospace;
      font-size: var(--fs-xs);
      color: var(--txt3);
      text-decoration: none;
      letter-spacing: 1px;
      transition: color 0.2s;
      word-break: break-all;
    }
    .file-link:hover {
      color: var(--hi);
    }
    .file-link::before {
      content: '> ';
      color: var(--amber);
      opacity: 0.6;
    }

    @media (max-width: 768px) {
      .container {
        padding: 1.5rem;
      }
      .bracket {
        font-size: var(--fs-sm);
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 1rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>

  <span class="bracket bracket-tl">[</span>
  <span class="bracket bracket-tr">]</span>
  <span class="bracket bracket-bl">[</span>
  <span class="bracket bracket-br">]</span>

  <nav class="lang-toggle" aria-label="Language selector">
    <button class="lang-btn active" data-lang="en" aria-pressed="true">EN</button>
    <button class="lang-btn" data-lang="es" aria-pressed="false">ES</button>
  </nav>

  <main class="container" role="main">

    <a class="pch-btn" href="../../index.html">HUMAN CONSCIOUSNESS TEST</a>

    <p class="insight" data-i18n="insight"></p>

    <hr class="divider-line" aria-hidden="true" />

    <div class="file-links">
      <span class="file-eyebrow" data-i18n="eyebrow"></span>
      <a class="file-link" href="BITNEKO_LICENCIA_ESPAÑOL.pdf" download>BITNEKO_LICENCIA_ESPAÑOL.pdf</a>
      <a class="file-link" href="BITNEKO_LICENCE_ENGLISH.pdf" download>BITNEKO_LICENCE_ENGLISH.pdf</a>
    </div>

  </main>

  <script>
    const i18n = {
      en: {
        eyebrow: "ACCESS THE WHITE-PAPER",
        insight: "What if Satoshi Nakamoto were a Salvadoran artisan? BITNEKO as proof that true consensus does not reside in code, but in collective perception.",
      },
      es: {
        eyebrow: "ACCEDE AL WHITE-PAPER",
        insight: "¿Y si Satoshi Nakamoto fuera un artesano salvadoreño? BITNEKO como prueba de que el verdadero consenso no reside en el código, sino en la percepción colectiva.",
      }
    };

    let currentLang = 'en';

    function applyLang(lang) {
      const t = i18n[lang];
      if (!t) return;
      currentLang = lang;

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) el.textContent = t[key];
      });

      document.documentElement.setAttribute('lang', lang === 'es' ? 'es' : 'en');

      document.querySelectorAll('.lang-btn').forEach(btn => {
        const isActive = btn.getAttribute('data-lang') === lang;
        btn.classList.toggle('active', isActive);
        btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      });
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => applyLang(btn.getAttribute('data-lang')));
    });

    const browserLang = (navigator.language || navigator.userLanguage || 'en').slice(0, 2);
    applyLang(i18n[browserLang] ? browserLang : 'en');
  </script>

</body>
